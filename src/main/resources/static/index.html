<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KTP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --glass: rgba(0, 0, 0, 0.02);
            --border: #e2e8f0;
            --success: #10b981;
            --error: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(37, 99, 235, 0.3);
        }

        .btn-ghost {
            background: #f1f5f9;
            border: 1px solid var(--border);
            color: var(--text-main);
        }

        .btn-ghost:hover {
            background: #e2e8f0;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            animation: fadeInUp 0.8s ease-out;
        }

        .table-container {
            overflow-x: auto;
            margin-top: 1rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            padding: 1rem;
            color: var(--text-muted);
            font-weight: 600;
            border-bottom: 1px solid var(--border);
            text-transform: uppercase;
            letter-spacing: 0.025em;
            font-size: 0.75rem;
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
            color: var(--text-main);
        }

        tr:last-child td {
            border-bottom: none;
        }

        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-male { background: #e0f2fe; color: #0284c7; }
        .badge-female { background: #fce7f3; color: #db2777; }

        .actions {
            display: flex;
            gap: 0.5rem;
        }

        .action-btn {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: 1px solid var(--border);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            background: white;
            color: var(--text-muted);
        }

        .action-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: #f8fafc;
        }

        .action-delete:hover { border-color: var(--error); color: var(--error); background: #fef2f2; }

        /* Modal Styles */
        .modal-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: white;
            width: 100%;
            max-width: 500px;
            border-radius: 24px;
            padding: 2.5rem;
            position: relative;
            transform: scale(0.9);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        .modal.active {
            transform: scale(1);
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-main);
        }

        input, select, textarea {
            width: 100%;
            background: #f8fafc;
            border: 1px solid var(--border);
            padding: 0.75rem 1rem;
            border-radius: 12px;
            color: var(--text-main);
            outline: none;
            transition: all 0.2s;
        }

        input:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .modal-header {
            margin-bottom: 1.5rem;
        }

        .modal-footer {
            margin-top: 2rem;
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
        }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 1rem 2rem;
            border-radius: 12px;
            background: white;
            border: 1px solid var(--border);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            display: none;
            z-index: 2000;
            animation: slideInRight 0.3s ease-out;
            color: var(--text-main);
        }

        @keyframes slideInRight {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div>
                <h1>KTP</h1>
            </div>
            <button class="btn btn-primary" onclick="openModal()">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                Tambah Data
            </button>
        </header>

        <main class="card">
            <div class="table-container">
                <table id="ktpTable">
                    <thead>
                        <tr>
                            <th>Nomor KTP</th>
                            <th>Nama Lengkap</th>
                            <th>Alamat</th>
                            <th>Tgl Lahir</th>
                            <th>L/P</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="ktpBody">
                        <!-- Data will be loaded here -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Modal Form -->
    <div id="modalBackdrop" class="modal-backdrop">
        <div class="modal" id="ktpModal">
            <div class="modal-header">
                <h2 id="modalTitle">Tambah Data KTP</h2>
            </div>
            <form id="ktpForm">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label>Nomor KTP</label>
                    <input type="text" id="nomorKtp" required placeholder="Contoh: 320123... (16 Digit)">
                </div>
                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <input type="text" id="namaLengkap" required>
                </div>
                <div class="form-group">
                    <label>Alamat</label>
                    <textarea id="alamat" rows="2" required></textarea>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>Tanggal Lahir</label>
                        <input type="date" id="tanggalLahir" required>
                    </div>
                    <div class="form-group">
                        <label>Jenis Kelamin</label>
                        <select id="jenisKelamin" required>
                            <option value="L">Laki-laki</option>
                            <option value="P">Perempuan</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-ghost" onclick="closeModal()">Batal</button>
                    <button type="submit" class="btn btn-primary">Simpan Data</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const API_URL = '/ktp';
        const modal = document.getElementById('modalBackdrop');
        const form = document.getElementById('ktpForm');
        const ktpBody = document.getElementById('ktpBody');

        // Initial Load
        document.addEventListener('DOMContentLoaded', loadData);

        async function loadData() {
            try {
                const response = await fetch(API_URL);
                const result = await response.json();
                
                ktpBody.innerHTML = '';
                if (result.status === 'success') {
                    result.data.forEach(item => {
                        const row = `
                            <tr>
                                <td style="font-family: monospace; font-weight: 600;">${item.nomorKtp}</td>
                                <td>${item.namaLengkap}</td>
                                <td style="color: var(--text-muted); max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${item.alamat}</td>
                                <td>${new Date(item.tanggalLahir).toLocaleDateString()}</td>
                                <td><span class="badge ${item.jenisKelamin === 'L' ? 'badge-male' : 'badge-female'}">${item.jenisKelamin}</span></td>
                                <td class="actions">
                                    <button class="action-btn action-edit" onclick="editData(${item.id})" title="Edit">
                                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
                                    </button>
                                    <button class="action-btn action-delete" onclick="deleteData(${item.id})" title="Hapus">
                                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                                    </button>
                                </td>
                            </tr>
                        `;
                        ktpBody.insertAdjacentHTML('beforeend', row);
                    });
                }
            } catch (error) {
                showToast('Gagal memuat data', 'error');
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const data = {
                nomorKtp: document.getElementById('nomorKtp').value,
                namaLengkap: document.getElementById('namaLengkap').value,
                alamat: document.getElementById('alamat').value,
                tanggalLahir: document.getElementById('tanggalLahir').value,
                jenisKelamin: document.getElementById('jenisKelamin').value
            };

            const method = id ? 'PUT' : 'POST';
            const url = id ? `${API_URL}/${id}` : API_URL;

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();

                if (result.status === 'success') {
                    showToast(result.message);
                    closeModal();
                    loadData();
                } else {
                    showToast(result.message, 'error');
                }
            } catch (error) {
                showToast('Terjadi kesalahan system', 'error');
            }
        });

        async function editData(id) {
            try {
                const response = await fetch(`${API_URL}/${id}`);
                const result = await response.json();
                if (result.status === 'success') {
                    const item = result.data;
                    document.getElementById('editId').value = item.id;
                    document.getElementById('nomorKtp').value = item.nomorKtp;
                    document.getElementById('namaLengkap').value = item.namaLengkap;
                    document.getElementById('alamat').value = item.alamat;
                    document.getElementById('tanggalLahir').value = item.tanggalLahir;
                    document.getElementById('jenisKelamin').value = item.jenisKelamin;
                    
                    document.getElementById('modalTitle').innerText = 'Edit Data KTP';
                    openModal();
                }
            } catch (error) {
                showToast('Gagal mengambil detail data', 'error');
            }
        }

        async function deleteData(id) {
            if (confirm('Apakah Anda yakin ingin menghapus data ini?')) {
                try {
                    const response = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                    const result = await response.json();
                    if (result.status === 'success') {
                        showToast(result.message);
                        loadData();
                    }
                } catch (error) {
                    showToast('Gagal menghapus data', 'error');
                }
            }
        }

        function openModal() {
            modal.style.display = 'flex';
            setTimeout(() => document.getElementById('ktpModal').classList.add('active'), 10);
        }

        function closeModal() {
            document.getElementById('ktpModal').classList.remove('active');
            setTimeout(() => {
                modal.style.display = 'none';
                form.reset();
                document.getElementById('editId').value = '';
                document.getElementById('modalTitle').innerText = 'Tambah Data KTP';
            }, 300);
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.style.borderColor = type === 'error' ? 'var(--error)' : 'var(--success)';
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }
    </script>
</body>
</html>
